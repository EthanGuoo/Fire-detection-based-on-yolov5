# RTX 5090 + YOLOv5 P6 模型优化配置
# P6 模型: 支持 1280x1280 输入，4 个检测层 (P3/8, P4/16, P5/32, P6/64)
# 使用方法: python train_rtx5090.py --model-size m6 --weights yolov5m6.pt --data data/coco.yaml

# ==================== 学习率策略 ====================
# P6 模型输入 1280，batch 较小，学习率相应调整
lr0: 0.01               # 初始学习率 (P6 相对保守)
lrf: 0.01               # 最终学习率系数
momentum: 0.937         # SGD momentum
weight_decay: 0.0005    # 权重衰减

# ==================== Warmup 策略 ====================
warmup_epochs: 3.0      # P6 模型 warmup
warmup_momentum: 0.8
warmup_bias_lr: 0.1

# ==================== 损失函数权重 ====================
box: 0.05               # Box loss 权重
cls: 0.3                # Classification loss 权重
obj: 0.7                # Objectness loss 权重
cls_pw: 1.0             # Classification BCE 正样本权重
obj_pw: 1.0             # Objectness BCE 正样本权重
fl_gamma: 0.0           # Focal loss gamma (0=禁用)
label_smoothing: 0.0    # 标签平滑

# ==================== 锚框策略 ====================
anchor_t: 4.0           # 锚框倍数阈值
iou_t: 0.20             # IoU 训练阈值

# ==================== 数据增强 ====================
# P6 模型处理高分辨率图像，增强策略与 P5 相同

# 颜色空间增强
hsv_h: 0.015            # HSV-Hue 增强
hsv_s: 0.7              # HSV-Saturation 增强
hsv_v: 0.4              # HSV-Value 增强

# 几何变换增强
degrees: 0.0            # 旋转角度
translate: 0.1          # 平移
scale: 0.9              # 缩放
shear: 0.0              # 剪切
perspective: 0.0        # 透视变换

# 翻转增强
flipud: 0.0             # 上下翻转
fliplr: 0.5             # 左右翻转

# 混合增强
mosaic: 1.0             # Mosaic 增强 (强烈推荐)
mixup: 0.15             # Mixup 增强
copy_paste: 0.1         # Copy-Paste 增强

# ==================== P6 模型推荐配置 ====================
# RTX 5090 (32GB) 推荐 Batch Size (1280x1280):
#
# YOLOv5n6: batch 64,  val_batch 128  (~18GB)
# YOLOv5s6: batch 48,  val_batch 96   (~20GB)
# YOLOv5m6: batch 32,  val_batch 64   (~24GB)  ← 推荐
# YOLOv5l6: batch 24,  val_batch 48   (~26GB)
# YOLOv5x6: batch 16,  val_batch 32   (~28GB)
#
# 完整训练命令:
#
# python train_rtx5090.py \
#   --model-size m6 \
#   --weights yolov5m6.pt \
#   --data data/coco.yaml \
#   --epochs 300
#
# 或手动指定配置:
#
# python train.py \
#   --cfg models/hub/yolov5m6.yaml \
#   --hyp configs/rtx5090_p6_optimal.yaml \
#   --weights yolov5m6.pt \
#   --data data/coco.yaml \
#   --img 1280 \
#   --batch 32 \
#   --val-batch 64 \
#   --workers 20 \
#   --device 0 \
#   --amp --ema --cos-lr
